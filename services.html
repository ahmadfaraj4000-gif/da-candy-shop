<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flower | Da Candy Shop</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="smoke-layer" aria-hidden="true"></div>
    <header class="site-header">
      <a class="brand" href="index.html"><img class="brand-logo" src="assets/logos/da-candy-shop-logo.png" alt="Da Candy Shop" /></a>
      <button class="nav-toggle" type="button" aria-label="Open menu" aria-expanded="false"><span></span><span></span><span></span></button>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="index.html">Home</a>
        <a href="#flower">Flower</a>
        <a href="landing-page.html">In-Store Payment</a>
        <a href="tel:+15107062263">Contact</a>
      </nav>
    </header>

    <main>
      <section id="flower" class="section shop-layout">
        <div class="section-heading wide">
          <p class="eyebrow">Flower Counter</p>
          <h1>Flower Menu</h1>
        </div>
        <aside class="filter-panel glass">
          <label>Search <input id="searchInput" type="search" placeholder="Search strains" /></label>
          <label>Potency <select id="potencyFilter"><option value="">All</option><option>High</option><option>Medium</option></select></label>
          <label>Type <select id="typeFilter"><option value="">All</option><option>Indica</option><option>Sativa</option><option>Hybrid</option></select></label>
          <label>Price Range <input id="priceFilter" type="range" min="10" max="10" value="10" /><span id="priceLabel">$10 max</span></label>
          <label>Sort By <select id="sortBy"><option value="popular">Most Popular</option><option value="potency">Highest Potency</option><option value="low">Lowest Price</option><option value="high">Highest Price</option></select></label>
        </aside>
        <div id="strainGrid" class="product-grid strain-grid"></div>
      </section>

      <section id="checkout" class="section checkout-section">
        <div class="section-heading">
          <p class="eyebrow">Checkout</p>
          <h2>Bag It Up</h2>
        </div>
        <form id="checkoutForm" class="checkout-grid glass">
          <div>
            <h3>Customer Information</h3>
            <label>First Name <input name="firstName" required /></label>
            <label>Last Name <input name="lastName" required /></label>
            <label>Phone Number <input name="phone" required pattern="[0-9+()\\-\\s]{7,}" /></label>
          </div>
          <div>
            <h3>Pickup Scheduling</h3>
            <label>Pickup Date <input name="pickupDate" type="date" required /></label>
            <label>Pickup Time <input name="pickupTime" type="time" min="09:00" max="17:00" step="900" required oninput="this.setCustomValidity('')" onchange="this.setCustomValidity('')" oninvalid="this.setCustomValidity(this.validity.rangeUnderflow ? 'Pick up time must be 9:00 AM or later.' : this.validity.rangeOverflow ? 'Pick up time must be 5:00 PM or earlier.' : this.validity.stepMismatch ? 'Pick up time must be in 15-minute intervals.' : 'Pick up time is required.')" /></label>
            <p class="payment-due">Payment Due At Pickup</p>
          </div>
          <div class="order-summary">
            <h3>Order Details</h3>
            <div id="cartItems"></div>
            <div class="total-row"><span>Total Amount</span><strong id="cartTotal">$0</strong></div>
            <button class="btn primary full" type="submit">Place Order</button>
          </div>
        </form>
        <div id="confirmation" class="confirmation glass hidden"></div>
      </section>

    </main>

    <footer class="site-footer">
      <div class="brand"><img class="brand-logo" src="assets/logos/da-candy-shop-logo.png" alt="Da Candy Shop" /></div>
      <div class="footer-links"><a href="index.html">Home</a><a href="#flower">Flower</a><a href="tel:+15107062263">Contact</a></div>
      <p>&copy; 2026 Da Candy Shop. All rights reserved.</p>
    </footer>
    <script src="nav.js"></script>
    <script src="age-gate.js"></script>

    <script type="module">
      const eighthPrice = 10;
      const strainImages = ["weed-1.avif","weed-2.avif","weed-3.avif","weed-4.avif","weed-5.avif","weed-6.avif","weed-7.avif","weed-8.avif","weed-9.avif"].map(name => `assets/images/${name}`);
      const strains = [
        ["Blue Dream","Hybrid","High","Berry-forward hybrid with a balanced profile.",98],
        ["Runtz","Hybrid","High","Sweet candy notes with colorful bag appeal.",100],
        ["Gelato","Hybrid","High","Creamy dessert aroma and relaxing finish.",92],
        ["Wedding Cake","Indica","High","Dense flower with a sweet finish.",95],
        ["OG Kush","Indica","High","Classic earthy profile with lasting body notes.",88],
        ["Sour Diesel","Sativa","High","Bright sativa with energizing character.",84],
        ["White Widow","Hybrid","Medium","Balanced strain with herbal bite.",76],
        ["Purple Haze","Sativa","Medium","Floral, grape-leaning sativa.",81],
        ["Pineapple Express","Hybrid","Medium","Tropical aroma with easygoing daytime appeal.",86],
        ["Northern Lights","Indica","High","Classic indica with pine and spice.",90],
        ["Granddaddy Purple","Indica","High","Purple flower with grape notes.",91],
        ["Gorilla Glue","Hybrid","High","Resin-heavy hybrid.",97]
      ].map((s, i) => ({ id: i + 1, name: s[0], type: s[1], potency: s[2], description: s[3], price: eighthPrice, popularity: s[4], image: strainImages[i % strainImages.length] }));
      const cart = JSON.parse(localStorage.getItem("dcsCart") || "[]");
      const money = value => `$${Number(value).toFixed(2)}`;
      const saveCart = () => localStorage.setItem("dcsCart", JSON.stringify(cart));
      function renderStrains() {
        const q = searchInput.value.toLowerCase();
        const maxPrice = Number(priceFilter.value);
        priceLabel.textContent = `$${maxPrice} max`;
        let list = strains.filter(s => s.name.toLowerCase().includes(q) && (!potencyFilter.value || s.potency === potencyFilter.value) && (!typeFilter.value || s.type === typeFilter.value) && s.price <= maxPrice);
        list.sort((a,b) => sortBy.value === "potency" ? b.popularity - a.popularity : sortBy.value === "low" ? a.price - b.price : sortBy.value === "high" ? b.price - a.price : b.popularity - a.popularity);
        strainGrid.innerHTML = list.map(s => `<article class="product-card strain-card"><div class="product-art ${s.type.toLowerCase()}"><img src="${s.image}" alt="${s.name} strain" /></div><div class="card-top"><span class="badge">${s.type}</span><span>${s.potency}</span></div><h3>${s.name}</h3><p>${s.description}</p><div class="specs"><span>${s.potency} Potency</span><span>${money(eighthPrice)}</span></div><label>Qty <input class="qty" id="qty-${s.id}" type="number" min="1" max="20" value="1" /></label><button class="btn small" data-id="${s.id}">Add to Cart</button></article>`).join("");
      }
      function renderCart() {
        cartItems.innerHTML = cart.length ? cart.map((item, i) => `<div class="cart-line"><span>${item.name} x ${item.quantity}</span><strong>${money(item.price * item.quantity)}</strong><button type="button" data-remove="${i}">Remove</button></div>`).join("") : "<p>Your candy bag is empty.</p>";
        cartTotal.textContent = money(cart.reduce((sum, item) => sum + item.price * item.quantity, 0));
      }
      document.querySelectorAll("#searchInput,#potencyFilter,#typeFilter,#priceFilter,#sortBy").forEach(el => el.addEventListener("input", renderStrains));
      strainGrid.addEventListener("click", e => {
        const id = Number(e.target.dataset.id);
        if (!id) return;
        const product = strains.find(s => s.id === id);
        const quantity = Number(document.getElementById(`qty-${id}`).value);
        cart.push({ productId: id, name: product.name, price: eighthPrice, quantity });
        saveCart();
        renderCart();
        e.target.textContent = "Added";
        window.setTimeout(() => {
          e.target.textContent = "Add to Cart";
        }, 900);
      });
      cartItems.addEventListener("click", e => { if (e.target.dataset.remove) { cart.splice(Number(e.target.dataset.remove), 1); saveCart(); renderCart(); } });
      async function convexMutation(path, args) {
        const baseUrl = localStorage.getItem("DCS_CONVEX_URL") || window.DCS_CONVEX_URL || "";
        if (!baseUrl) return null;
        const response = await fetch(`${baseUrl.replace(/\/$/, "")}/api/mutation`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ path, args, format: "json" })
        });
        if (!response.ok) throw new Error("Convex request failed.");
        const payload = await response.json();
        return payload.value;
      }
      checkoutForm.addEventListener("submit", async e => {
        e.preventDefault();
        if (!cart.length) return alert("Add at least one strain before placing an order.");
        const data = Object.fromEntries(new FormData(checkoutForm));
        const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
        let orderNumber = `DCS-${Number(localStorage.getItem("dcsOrderSeed") || 100000) + 1}`;
        const orderInput = { customerName: `${data.firstName} ${data.lastName}`, phone: data.phone, pickupDate: data.pickupDate, pickupTime: data.pickupTime, items: [...cart], total };
        try {
          const saved = await convexMutation("orders:createOrder", orderInput);
          if (saved?.orderNumber) orderNumber = saved.orderNumber;
        } catch (error) {
          console.warn(error);
        }
        localStorage.setItem("dcsOrderSeed", orderNumber.replace("DCS-", ""));
        const order = { orderNumber, ...orderInput, status: "Pending", createdAt: Date.now() };
        localStorage.setItem("dcsLatestOrder", JSON.stringify(order));
        cart.length = 0; saveCart(); renderCart(); checkoutForm.reset();
        confirmation.classList.remove("hidden");
        confirmation.innerHTML = `<h2>Sweet, You're Set</h2><p>Your pickup order is confirmed.</p><h3>${order.orderNumber}</h3><p>Pickup Time: ${order.pickupDate} at ${order.pickupTime}</p><div>${order.items.map(i => `<p>${i.name} x ${i.quantity} - ${money(i.price * i.quantity)}</p>`).join("")}</div><strong>Total: ${money(total)}</strong>`;
      });
      renderStrains(); renderCart();
    </script>
  </body>
</html>
