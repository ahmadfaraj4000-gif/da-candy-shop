<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Options | Da Candy Shop</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="smoke-layer" aria-hidden="true"></div>
    <main class="qr-landing link-landing">
      <section class="link-landing-panel">
        <div class="link-logo-card">
          <img class="link-logo" src="assets/logos/da-candy-shop-logo.png" alt="Da Candy Shop" />
        </div>
        <h1>Da Candy Shop</h1>
        <p>Payment Options</p>
        <div class="link-button-stack">
          <a class="link-payment-button primary" href="#" aria-label="Pay with Cash App">
            <img src="assets/logos/cash-app.svg" alt="" />
            <span>Cash App</span>
          </a>
          <a class="link-payment-button primary" href="#" aria-label="Pay with PayPal">
            <img src="assets/logos/paypal.svg" alt="" />
            <span>PayPal</span>
          </a>
          <a class="link-payment-button primary" href="#" aria-label="Pay with Stripe">
            <img src="assets/logos/stripe.svg" alt="" />
            <span>Stripe</span>
          </a>
        </div>
        <p class="link-landing-foot">100 Candy Lane, Atlanta, GA</p>
      </section>
    </main>
    <script src="age-gate.js"></script>
  </body>
</html>
